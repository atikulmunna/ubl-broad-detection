# PS Perfect Store Adjacency Rules
# Priority: PONDS > GAL > HAIRCARE
# When categories are adjacent, higher priority brand takes 4 legs, lower gets 3
adjacency_rules:
  priority_order:
    - PONDS      # highest priority
    - GAL
    - HAIRCARE   # lowest priority

  # Default leg requirements when NOT adjacent
  default_legs:
    PONDS: 4
    GAL: 4
    HAIRCARE: 4

  # Leg adjustments when adjacent (higher priority keeps 4, lower gets 3)
  adjacency_adjustments:
    PONDS_adjacent_to_GAL:
      PONDS: 4
      GAL: 3
    PONDS_adjacent_to_HAIRCARE:
      PONDS: 4
      HAIRCARE: 3
    GAL_adjacent_to_HAIRCARE:
      GAL: 4
      HAIRCARE: 3
    # When PONDS adjacent to both GAL and HAIRCARE (common shelftalker)
    PONDS_adjacent_to_GAL_and_HAIRCARE:
      PONDS: 4
      GAL: 3
      HAIRCARE: 3

  # Shelftalker waiver: when common leg involved, shelftalker compliance waived
  common_leg_shelftalker_waiver: true
