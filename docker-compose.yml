services:
  localstack:
    image: localstack/localstack:4.11.1
    container_name: localstack_aws
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs
      # - DEBUG=1
      - DEBUG=0
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=ap-southeast-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - LOCALSTACK_HOST=localstack
      - LS_LOG=error # Set log level to error to reduce verbosity
    volumes:
      - "./simulation/localstack-init:/etc/localstack/init/ready.d"
      - "localstack-data:/var/lib/localstack"
    networks:
      - ubl-simulation-network
  
